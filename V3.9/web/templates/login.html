<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Net-Fire-Monitor – Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">NET-FIRE-<span>MONITOR</span></div>
    <div class="login-sub">🔒 NETZWERK-MODUS – ANMELDUNG ERFORDERLICH</div>
    <form method="POST" action="/login">
      <!-- CSRF-Token: schützt vor Cross-Site-Request-Forgery -->
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input class="inp" style="width:100%;margin-bottom:10px;" type="password"
             name="password" placeholder="Admin-Passwort" autofocus
             autocomplete="current-password">
      <button class="btn btn-b btn-lg" style="width:100%;margin-top:6px;" type="submit">
        🔓 Anmelden
      </button>
    </form>
    {% if error %}
    <div class="login-err">❌ {{ error }}</div>
    {% endif %}
  </div>
</div>
</body>
</html>
